<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ConflictWatch — Live Feed</title>

  <!-- Icons & Favicon -->
  <link rel="icon" href="/static/favicon.ico" />
  <link rel="apple-touch-icon" href="/static/icons/apple-touch-icon.png" />

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <!-- Custom CSS -->
  <link rel="stylesheet" href="/static/css/main.css" />
</head>
<body>

<div id="root"></div>

<!-- React + Babel (no build step needed) -->
<script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.development.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>

<script type="text/babel">

const { useState, useEffect } = React;

// ─── API URL — change this if backend runs on a different port ───────────────
const API_BASE = "http://localhost:8000";

// ─── Theme hook ──────────────────────────────────────────────────────────────
function useTheme() {
  const [theme, setTheme] = useState(() =>
    localStorage.getItem("cw-theme") || "dark"
  );
  useEffect(() => {
    document.documentElement.setAttribute("data-theme", theme);
    localStorage.setItem("cw-theme", theme);
  }, [theme]);
  const toggle = () => setTheme(t => t === "dark" ? "light" : "dark");
  return [theme, toggle];
}

// ─── Sidebar ─────────────────────────────────────────────────────────────────
function Sidebar() {
  const navItems = [
    { icon: "📡", label: "Live Feed",   active: true  },
    { icon: "🗺️", label: "Map View",   active: false },
    { icon: "🔍", label: "Explore",    active: false },
    { icon: "📊", label: "Analytics",  active: false },
    { icon: "⚙️", label: "Settings",  active: false },
  ];
  return (
    <aside className="sidebar">
      <div className="sidebar-logo">
        <div className="logo-icon">📡</div>
        <div>
          <span>ConflictWatch</span>
          <span className="logo-sub">Live Intel</span>
        </div>
      </div>

      <p className="nav-section-title">Navigation</p>
      {navItems.map(item => (
        <a key={item.label} className={`nav-item ${item.active ? "active" : ""}`} href="#">
          <span className="nav-icon">{item.icon}</span>
          {item.label}
        </a>
      ))}

      <div className="sidebar-footer">
        <p className="nav-section-title" style={{padding: "0 0 10px"}}>Data Source</p>
        <small style={{color: "rgba(255,255,255,0.3)", fontSize: "0.7rem", lineHeight: 1.5}}>
          Powered by Al Jazeera RSS<br/>
          FastAPI · React · PostgreSQL
        </small>
      </div>
    </aside>
  );
}

// ─── Topbar ───────────────────────────────────────────────────────────────────
function Topbar({ theme, onToggleTheme, total }) {
  const [showLogin, setShowLogin]       = useState(false);
  const [showRegister, setShowRegister] = useState(false);

  return (
    <>
      <header className="topbar">
        <div className="topbar-left">
          <h1>Live Conflict Feed</h1>
          <p>{total} events tracked today</p>
        </div>
        <div className="topbar-right">
          <span className="toggle-label">{theme === "dark" ? "🌙" : "☀️"}</span>
          <button className="theme-toggle" onClick={onToggleTheme} title="Toggle theme" />

          <button className="btn-outline-ghost" onClick={() => setShowLogin(true)}>
            Log in
          </button>
          <button className="btn-accent" onClick={() => setShowRegister(true)}>
            Register
          </button>
        </div>
      </header>

      {/* Login Modal */}
      {showLogin && (
        <Modal title="Welcome back" onClose={() => setShowLogin(false)}>
          <label style={{fontSize:"0.8rem", color:"var(--text-secondary)"}}>Email</label>
          <input className="form-control mb-3 mt-1" placeholder="you@example.com"
            style={{background:"var(--bg-primary)", color:"var(--text-primary)", border:"1px solid var(--border)"}} />
          <label style={{fontSize:"0.8rem", color:"var(--text-secondary)"}}>Password</label>
          <input type="password" className="form-control mb-4 mt-1" placeholder="••••••••"
            style={{background:"var(--bg-primary)", color:"var(--text-primary)", border:"1px solid var(--border)"}} />
          <button className="btn-accent w-100">Log in</button>
        </Modal>
      )}

      {/* Register Modal */}
      {showRegister && (
        <Modal title="Create account" onClose={() => setShowRegister(false)}>
          <label style={{fontSize:"0.8rem", color:"var(--text-secondary)"}}>Full name</label>
          <input className="form-control mb-3 mt-1" placeholder="Your name"
            style={{background:"var(--bg-primary)", color:"var(--text-primary)", border:"1px solid var(--border)"}} />
          <label style={{fontSize:"0.8rem", color:"var(--text-secondary)"}}>Email</label>
          <input className="form-control mb-3 mt-1" placeholder="you@example.com"
            style={{background:"var(--bg-primary)", color:"var(--text-primary)", border:"1px solid var(--border)"}} />
          <label style={{fontSize:"0.8rem", color:"var(--text-secondary)"}}>Password</label>
          <input type="password" className="form-control mb-4 mt-1" placeholder="••••••••"
            style={{background:"var(--bg-primary)", color:"var(--text-primary)", border:"1px solid var(--border)"}} />
          <button className="btn-accent w-100">Create account</button>
        </Modal>
      )}
    </>
  );
}

// ─── Modal ────────────────────────────────────────────────────────────────────
function Modal({ title, children, onClose }) {
  return (
    <div style={{
      position:"fixed", inset:0, background:"rgba(0,0,0,0.6)",
      zIndex:200, display:"flex", alignItems:"center", justifyContent:"center"
    }} onClick={onClose}>
      <div style={{
        background:"var(--bg-card)", borderRadius:16, padding:32, width:360,
        border:"1px solid var(--border)", boxShadow:"0 24px 64px rgba(0,0,0,0.5)"
      }} onClick={e => e.stopPropagation()}>
        <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:24}}>
          <h2 style={{fontFamily:"Syne,sans-serif", fontWeight:700, fontSize:"1.1rem",
            color:"var(--text-primary)", margin:0}}>{title}</h2>
          <button onClick={onClose} style={{background:"none", border:"none",
            color:"var(--text-muted)", fontSize:"1.2rem", cursor:"pointer"}}>✕</button>
        </div>
        {children}
      </div>
    </div>
  );
}

// ─── Stats Bar ────────────────────────────────────────────────────────────────
function StatsBar({ stats }) {
  if (!stats) return null;
  const items = [
    { label: "Total Events",  value: stats.total },
    { label: "Conflict",      value: stats.by_category?.conflict  || 0 },
    { label: "Protests",      value: stats.by_category?.protest   || 0 },
  ];
  return (
    <div className="stats-bar">
      {items.map(s => (
        <div key={s.label} className="stat-card">
          <div className="stat-label">{s.label}</div>
          <div className="stat-value">{s.value}</div>
        </div>
      ))}
    </div>
  );
}

// ─── News Card ────────────────────────────────────────────────────────────────
function NewsCard({ item, index }) {
  return (
    <div className="news-card" style={{animationDelay: `${index * 60}ms`}}>
      <div className="country-badge">{item.country}</div>
      <div className="news-body">
        <div className="news-headline">{item.headline}</div>
        <div className="news-meta">
          <span className="news-date">🕐 {item.date}</span>
          <span className={`news-tag tag-${item.category}`}>{item.category}</span>
        </div>
      </div>
    </div>
  );
}

// ─── Filter Bar ───────────────────────────────────────────────────────────────
function FilterBar({ active, onChange }) {
  const filters = ["all", "conflict", "protest", "violence"];
  return (
    <div className="filter-bar">
      <span style={{fontSize:"0.75rem", color:"var(--text-muted)", marginRight:4}}>Filter:</span>
      {filters.map(f => (
        <button key={f} className={`filter-btn ${active === f ? "active" : ""}`}
          onClick={() => onChange(f)}>
          {f.charAt(0).toUpperCase() + f.slice(1)}
        </button>
      ))}
    </div>
  );
}

// ─── App ──────────────────────────────────────────────────────────────────────
function App() {
  const [theme, toggleTheme] = useTheme();
  const [news,  setNews]     = useState([]);
  const [stats, setStats]    = useState(null);
  const [loading, setLoading] = useState(true);
  const [error,   setError]  = useState(null);
  const [filter,  setFilter] = useState("all");

  useEffect(() => {
    Promise.all([
      fetch(`${API_BASE}/api/news`).then(r => r.json()),
      fetch(`${API_BASE}/api/stats`).then(r => r.json()),
    ])
      .then(([newsData, statsData]) => {
        setNews(newsData);
        setStats(statsData);
        setLoading(false);
      })
      .catch(err => {
        setError("Could not reach the API. Make sure the FastAPI server is running on port 8000.");
        setLoading(false);
      });
  }, []);

  const filtered = filter === "all" ? news : news.filter(n => n.category === filter);

  return (
    <div className="app-layout">
      <Sidebar />
      <div className="main-content">
        <Topbar theme={theme} onToggleTheme={toggleTheme} total={news.length} />
        <div className="content-area">
          <StatsBar stats={stats} />
          <FilterBar active={filter} onChange={setFilter} />

          {loading && (
            <div className="state-box">
              <div className="spinner" />
              <p>Fetching live feed…</p>
            </div>
          )}

          {error && (
            <div className="state-box">
              <div className="icon">⚠️</div>
              <p style={{color:"var(--tag-conflict-text)"}}>{error}</p>
            </div>
          )}

          {!loading && !error && (
            <div className="news-list">
              {filtered.length === 0
                ? <div className="state-box"><p>No events match this filter.</p></div>
                : filtered.map((item, i) => (
                    <NewsCard key={item.id} item={item} index={i} />
                  ))
              }
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
