<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conflict Tracker — Live Event Monitor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #333;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            background: white;
            padding: 30px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        h1 {
            font-size: 32px;
            color: #1e3c72;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 14px;
            color: #666;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .stat-card h3 {
            color: #666;
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .stat-card .number {
            font-size: 36px;
            font-weight: bold;
            color: #1e3c72;
        }

        .controls {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        input, select {
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            min-width: 200px;
        }

        button {
            padding: 10px 20px;
            background: #1e3c72;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.3s;
        }

        button:hover {
            background: #2a5298;
        }

        .events-container {
            display: grid;
            gap: 20px;
        }

        .event-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            border-left: 5px solid #1e3c72;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .event-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 12px rgba(0, 0, 0, 0.15);
        }

        .event-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 10px;
        }

        .event-country {
            display: inline-block;
            background: #1e3c72;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .event-category {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            margin-left: 10px;
        }

        .category-conflict {
            background: #fee2e2;
            color: #7f1d1d;
        }

        .category-protest {
            background: #fef3c7;
            color: #78350f;
        }

        .category-violence {
            background: #fecaca;
            color: #7f1d1d;
        }

        .event-title {
            font-size: 18px;
            font-weight: 600;
            color: #1e3c72;
            margin-bottom: 10px;
        }

        .event-date {
            font-size: 12px;
            color: #999;
            margin-bottom: 10px;
        }

        .event-link {
            color: #2a5298;
            text-decoration: none;
            font-size: 13px;
            word-break: break-all;
        }

        .event-link:hover {
            text-decoration: underline;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: white;
            font-size: 18px;
        }

        .error {
            background: #fee2e2;
            color: #7f1d1d;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: white;
        }

        .empty-state h2 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        footer {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 40px;
            border-radius: 10px;
            font-size: 13px;
        }

        .api-status {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            background: #dcfce7;
            color: #166534;
        }

        .api-status.offline {
            background: #fee2e2;
            color: #7f1d1d;
        }

        @media (max-width: 768px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
            .controls {
                flex-direction: column;
            }
            input, select {
                width: 100%;
                min-width: unset;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌍 Conflict Tracker</h1>
            <p class="subtitle">Real-time global conflict monitoring • <span class="api-status" id="api-status">Loading...</span></p>
        </header>

        <div class="dashboard">
            <div class="stat-card">
                <h3>Total Events</h3>
                <div class="number" id="stat-total">--</div>
            </div>
            <div class="stat-card">
                <h3>Conflicts</h3>
                <div class="number" id="stat-conflict">--</div>
            </div>
            <div class="stat-card">
                <h3>Unique Countries</h3>
                <div class="number" id="stat-countries">--</div>
            </div>
        </div>

        <div class="controls">
            <input type="text" id="search" placeholder="Search by country or headline...">
            <select id="category-filter">
                <option value="">All Categories</option>
                <option value="conflict">Conflict</option>
                <option value="protest">Protest</option>
                <option value="violence">Violence</option>
            </select>
            <button onclick="fetchAndDisplay()">🔄 Refresh</button>
        </div>

        <div id="error-container"></div>

        <div class="events-container" id="events">
            <div class="loading">⏳ Loading events...</div>
        </div>

        <footer>
            Backend API: <code id="api-url">http://localhost:8000</code> | 
            Data Source: Al Jazeera RSS Feed | 
            Built with ❤️ for global awareness
        </footer>
    </div>

    <script>
        const API_URL = 'http://localhost:8000';

        async function checkApiStatus() {
            try {
                const response = await fetch(`${API_URL}/api/stats`, {
                    headers: { 'Accept': 'application/json' }
                });
                if (response.ok) {
                    document.getElementById('api-status').textContent = '✅ API Online';
                    document.getElementById('api-status').classList.remove('offline');
                    return true;
                }
            } catch (e) {
                document.getElementById('api-status').textContent = '❌ API Offline';
                document.getElementById('api-status').classList.add('offline');
                return false;
            }
        }

        async function fetchAndDisplay() {
            const isOnline = await checkApiStatus();
            if (!isOnline) {
                showError('⚠️ Cannot connect to backend. Make sure FastAPI is running on http://localhost:8000');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/api/news`);
                const events = await response.json();

                // Apply filters
                const searchQuery = document.getElementById('search').value.toLowerCase();
                const categoryFilter = document.getElementById('category-filter').value;

                let filtered = events.filter(e => {
                    const matchSearch = !searchQuery || 
                        e.country.toLowerCase().includes(searchQuery) ||
                        e.headline.toLowerCase().includes(searchQuery);
                    const matchCategory = !categoryFilter || e.category === categoryFilter;
                    return matchSearch && matchCategory;
                });

                // Update stats
                updateStats(events);

                // Display events
                if (filtered.length === 0) {
                    document.getElementById('events').innerHTML = `
                        <div class="empty-state">
                            <h2>No events found</h2>
                            <p>Try adjusting your filters or search terms</p>
                        </div>
                    `;
                } else {
                    document.getElementById('events').innerHTML = filtered.map(e => `
                        <div class="event-card">
                            <div class="event-header">
                                <div>
                                    <span class="event-country">${e.country}</span>
                                    <span class="event-category category-${e.category}">${e.category}</span>
                                </div>
                            </div>
                            <div class="event-title">${e.headline}</div>
                            <div class="event-date">📅 ${new Date(e.date).toLocaleDateString()}</div>
                        </div>
                    `).join('');
                }
            } catch (error) {
                showError(`Error fetching events: ${error.message}`);
            }
        }

        function updateStats(events) {
            const stats = {
                total: events.length,
                conflict: events.filter(e => e.category === 'conflict').length,
                countries: new Set(events.map(e => e.country)).size
            };

            document.getElementById('stat-total').textContent = stats.total;
            document.getElementById('stat-conflict').textContent = stats.conflict;
            document.getElementById('stat-countries').textContent = stats.countries;
        }

        function showError(message) {
            const errorDiv = document.getElementById('error-container');
            errorDiv.innerHTML = `<div class="error">${message}</div>`;
            document.getElementById('events').innerHTML = '';
        }

        // Event listeners
        document.getElementById('search').addEventListener('input', fetchAndDisplay);
        document.getElementById('category-filter').addEventListener('change', fetchAndDisplay);

        // Initial load
        checkApiStatus();
        fetchAndDisplay();

        // Auto-refresh every 30 seconds
        setInterval(fetchAndDisplay, 30000);
    </script>
</body>
</html>
